<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration - LocalBiz</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .registration-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 2rem;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
    </style>
</head>

<body>
    <header>
        <div class="container nav">
            <div class="logo">LocalBiz</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="search.html">Services</a>
                <a href="forum.html">Community</a>
                <a href="register.html" class="btn btn-outline">Register Business</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="registration-container">
            <h1 class="mb-4">Register Your Business or Service</h1>
            <p class="text-muted mb-4">Join our community and reach thousands of local customers. Showcase your skills,
                products, and services.</p>

            <form action="#">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="bizName">Business/Freelancer Name</label>
                        <input type="text" id="bizName" placeholder="e.g. John's Plumbing" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Service Category</label>
                        <select id="category">
                            <option value="plumbing">Plumbing</option>
                            <option value="carpentry">Carpentry</option>
                            <option value="electrical">Electrical</option>
                            <option value="home">Home Services</option>
                            <option value="tutoring">Tutoring</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Tell us about your services</label>
                    <textarea id="description" rows="4" placeholder="Describe what you do..."></textarea>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="location">Primary Location</label>
                        <input type="text" id="location" placeholder="City or Neighborhood">
                    </div>
                    <div class="form-group">
                        <label for="price">Starting Price/Rate</label>
                        <input type="text" id="price" placeholder="e.g. $50/hr">
                    </div>
                </div>

                <div class="form-group">
                    <label>Registration Type</label>
                    <div style="display: flex; gap: 2rem; margin-top: 0.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="radio" name="reg-type" value="biz" style="width: auto;"> Small Business
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="radio" name="reg-type" value="free" style="width: auto;"> Freelancer
                        </label>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create My Profile</button>
                    <p class="text-center mt-4"><a href="index.html" class="text-muted">Already have an account? Sign
                            In</a></p>
                </div>
            </form>
        </div>
    </main>

    <footer class="text-center mt-4 mb-4">
        <p class="text-muted">&copy; 2026 LocalBiz Portal. All rights reserved.</p>
    </footer>
</body>

</html>
